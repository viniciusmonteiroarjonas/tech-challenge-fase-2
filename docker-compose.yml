version: '3.8'

services:
  app:
    build: .
    container_name: blogging-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=mongodb://mongo:27017/blogging_platform
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - blogging-network

  mongo:
    image: mongo:7-jammy
    container_name: blogging-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - blogging-network

volumes:
  mongo_data:

networks:
  blogging-network:
    driver: bridge
